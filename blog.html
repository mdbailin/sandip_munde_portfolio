<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Blog | Sandip Munde</title>
    <meta name="description" content="Blog and mathematics writing by Sandip Munde." />
    <link rel="icon" href="favicon.svg" type="image/svg+xml" />
    <link rel="shortcut icon" href="favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="styles/main.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
  </head>
  <body>
    <div class="page-shell">
      <header id="site-header"></header>
      <main class="page">
        <!-- Dynamic header - content will be set by blog.js -->

          <p class="eyebrow" id="dynamic-eyebrow"></p>
          <h1 id="dynamic-title"></h1>
          <p id="dynamic-description"></p>
        </section>
        
        <section id="blog-list" class="post-list"></section>
      </main>
      <footer id="site-footer"></footer>
    </div>
    <script type="module" src="scripts/blog.js"></script>
  </body>
</html>
